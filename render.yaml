services:
  - type: web
    name: helpmateai-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    disk:
      name: helpmateai-data
      mountPath: /var/data/helpmate
      sizeGB: 2
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HELPMATE_RERANKER_ENABLED
        value: "true"
      - key: HELPMATE_DATA_DIR
        value: /var/data/helpmate
      - key: HELPMATE_UPLOADS_DIR
        value: /var/data/helpmate/uploads
      - key: HELPMATE_INDEXES_DIR
        value: /var/data/helpmate/indexes
      - key: HELPMATE_CACHE_DIR
        value: /var/data/helpmate/cache
      - key: HELPMATE_CORS_ORIGINS
        value: https://app.example.com
      - key: OPENAI_API_KEY
        sync: false
