services:
  api:
    image: ghcr.io/leanderantony/helpmateai_rag_qa_system/api:latest
    container_name: helpmate-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8001
    expose:
      - "8001"
    volumes:
      - helpmate_uploads:/var/data/helpmate/uploads
      - helpmate_indexes:/var/data/helpmate/indexes
      - helpmate_cache:/var/data/helpmate/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2
    container_name: helpmate-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  helpmate_uploads:
  helpmate_indexes:
  helpmate_cache:
  caddy_data:
  caddy_config:
